<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCO Simulator | Golf Cart Electric Vehicle — Beyond Green x Club Car</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --green-dark:#0c2016; --green:#123524; --green-mid:#1c4a30; --green-soft:#eef2ec;
    --gold:#a9843a; --gold-bright:#c9a55c; --gold-light:#ece0c4; --white:#ffffff; --gray-bg:#f7f6f2; --gray-line:#e6e3da;
    --text:#181815; --text-mute:#726f64; --danger:#8a3324; --radius:14px;
    --serif:'Cormorant Garamond', 'Sarabun', serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Sarabun',sans-serif;background:var(--gray-bg);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased;}
  header.topbar{background:linear-gradient(135deg,var(--green-dark),#0a1a12);color:#fff;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;position:sticky;top:0;z-index:50;border-bottom:1px solid var(--gold);}
  header.topbar .brand{display:flex;align-items:center;gap:14px;}
  header.topbar .brand .dot{width:6px;height:6px;border-radius:50%;background:var(--gold-bright);box-shadow:0 0 0 3px rgba(201,165,92,.18);}
  header.topbar h1{font-size:19px;margin:0;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;}
  header.topbar .sub{font-size:11.5px;color:#b9c2ba;margin-top:4px;letter-spacing:.4px;}
  .topbar-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .btn{border:1px solid rgba(0,0,0,.12);background:#fff;color:var(--text);padding:9px 16px;border-radius:999px;font-family:inherit;font-size:12.5px;font-weight:500;letter-spacing:.3px;cursor:pointer;transition:.18s;white-space:nowrap;}
  .btn:hover{border-color:var(--gold);color:var(--gold);}
  .btn.gold{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:600;}
  .btn.gold:hover{background:#8f6d2e;color:#fff;}
  .btn.ghost{background:transparent;border-color:rgba(255,255,255,.25);color:#e9e6dd;}
  .btn.ghost:hover{border-color:var(--gold-bright);color:var(--gold-bright);}
  .btn.small{padding:6px 13px;font-size:11.5px;}
  .btn.danger{border-color:var(--danger);color:var(--danger);}
  nav.tabs{display:flex;background:#fff;border-bottom:1px solid var(--gray-line);overflow-x:auto;position:sticky;top:70px;z-index:40;padding:0 32px;}
  nav.tabs button{flex:0 0 auto;border:none;background:transparent;padding:16px 18px;font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--text-mute);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s;}
  nav.tabs button:hover{color:var(--green);}
  nav.tabs button.active{color:var(--green-dark);border-bottom-color:var(--gold);}
  main{max-width:1360px;margin:0 auto;padding:32px 32px 70px;}
  .panel{display:none;}
  .panel.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .card{background:#fff;border:1px solid var(--gray-line);border-radius:var(--radius);padding:26px 28px;margin-bottom:20px;box-shadow:0 1px 2px rgba(20,20,10,.03);}
  .card h2{font-size:15px;margin:0 0 6px;color:var(--green-dark);font-weight:600;letter-spacing:.3px;}
  .card .card-desc{font-size:12.5px;color:var(--text-mute);margin-bottom:16px;}
  .grid{display:grid;gap:16px;}
  .grid.cols-2{grid-template-columns:1fr 1fr;}
  .grid.cols-3{grid-template-columns:repeat(3,1fr);}
  .grid.cols-4{grid-template-columns:repeat(4,1fr);}
  .grid.cols-5{grid-template-columns:repeat(5,1fr);}
  @media(max-width:900px){.grid.cols-2,.grid.cols-3,.grid.cols-4,.grid.cols-5{grid-template-columns:1fr 1fr;}}
  .field label{display:block;font-size:11px;color:var(--text-mute);margin-bottom:6px;letter-spacing:.3px;text-transform:uppercase;}
  .field .unit{color:#a19d8f;font-weight:400;text-transform:none;letter-spacing:0;}
  .field input, .field select{width:100%;padding:10px 12px;border:1px solid var(--gray-line);border-radius:8px;font-family:inherit;font-size:14px;background:#fbfbf9;color:var(--text);transition:.15s;}
  .field input:focus, .field select:focus{outline:none;border-color:var(--gold);background:#fff;}
  .brandblock{border:1px solid var(--gray-line);border-radius:var(--radius);padding:22px;background:#fff;box-shadow:0 1px 2px rgba(20,20,10,.03);}
  .brandblock.clubcar{border-top:2px solid var(--green-dark);}
  .brandblock.competitor{border-top:2px solid var(--gold);}
  .brandblock h3{margin:0 0 14px;font-size:16px;font-weight:600;letter-spacing:.2px;display:flex;justify-content:space-between;align-items:center;}
  .tag{display:inline-block;font-size:10px;padding:3px 9px;border-radius:999px;margin-left:6px;font-weight:600;letter-spacing:.3px;vertical-align:middle;text-transform:uppercase;}
  .tag.standard{background:var(--green-soft);color:var(--green-mid);}
  .tag.actual{background:var(--gold-light);color:#7a5f1c;}
  .tag.unverified{background:#f7e2da;color:var(--danger);}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--gray-line);border:1px solid var(--gray-line);border-radius:var(--radius);overflow:hidden;}
  @media(max-width:1000px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
  .kpi{background:#fff;padding:22px 20px;}
  .kpi.gold{background:linear-gradient(180deg,#fff,#fdfbf5);}
  .kpi .kpi-label{font-size:10.5px;color:var(--text-mute);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;letter-spacing:.5px;text-transform:uppercase;}
  .kpi .kpi-value{font-family:'Sarabun',sans-serif;font-size:26px;font-weight:700;color:var(--green-dark);letter-spacing:.1px;line-height:1.2;font-variant-numeric:tabular-nums;}
  .kpi .kpi-sub{font-size:11px;color:var(--text-mute);margin-top:8px;}
  .kpi .info-btn{cursor:pointer;color:#c3c0b3;font-size:11px;border:1px solid var(--gray-line);border-radius:50%;width:15px;height:15px;display:inline-flex;align-items:center;justify-content:center;}
  .kpi .formula-note{display:none;font-size:11px;color:var(--text-mute);background:var(--gray-bg);padding:9px;border-radius:6px;margin-top:10px;line-height:1.5;}
  .kpi .formula-note.show{display:block;}
  table{width:100%;border-collapse:collapse;font-size:12.6px;}
  table th{background:var(--green-dark);color:#f2efe6;padding:10px 12px;text-align:right;font-weight:500;letter-spacing:.3px;text-transform:uppercase;font-size:10.5px;position:sticky;top:0;}
  table th:first-child, table td:first-child{text-align:left;}
  table td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--gray-line);}
  table tr:nth-child(even) td{background:#fbfaf7;}
  .table-wrap{max-height:480px;overflow:auto;border:1px solid var(--gray-line);border-radius:10px;}
  .chart-box{background:#fff;border:1px solid var(--gray-line);border-radius:var(--radius);padding:20px;margin-bottom:20px;box-shadow:0 1px 2px rgba(20,20,10,.03);}
  .chart-box h3{font-size:12px;margin:0 0 16px;color:var(--text-mute);font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
  .chart-box canvas{max-height:340px;}
  .exec-summary{background:linear-gradient(160deg,#0f2a1c,#0a1a12);color:#f2efe6;border-radius:var(--radius);padding:34px 36px;font-size:15px;line-height:2;border:1px solid var(--gold);}
  .exec-summary p{margin:0 0 14px;color:#dbe0d8;}
  .exec-summary strong{color:var(--gold-bright);}
  .toggle-row{display:flex;align-items:center;gap:10px;font-size:13px;}
  .switch{position:relative;display:inline-block;width:42px;height:23px;}
  .switch input{opacity:0;width:0;height:0;}
  .slider-tg{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#d8d5c9;transition:.2s;border-radius:22px;}
  .slider-tg:before{position:absolute;content:"";height:17px;width:17px;left:3px;bottom:3px;background:white;transition:.2s;border-radius:50%;box-shadow:0 1px 2px rgba(0,0,0,.2);}
  input:checked + .slider-tg{background:var(--green-mid);}
  input:checked + .slider-tg:before{transform:translateX(19px);}
  .badge-winner{background:var(--green-dark);color:var(--gold-bright);font-size:10px;padding:4px 11px;border-radius:999px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;border:1px solid var(--gold);}
  .notice{background:#fbf7ec;border:1px solid var(--gold-light);border-radius:10px;padding:14px 18px;font-size:12.5px;color:#6b5620;margin-bottom:18px;}
  .notice.collapsed .notice-body{display:none;}
  .section-title{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--green-dark);margin:2px 0 6px;letter-spacing:.2px;}
  .section-sub{font-size:12.5px;color:var(--text-mute);margin-bottom:22px;letter-spacing:.1px;}
  details.acc{border:1px solid var(--gray-line);border-radius:10px;margin-bottom:10px;overflow:hidden;}
  details.acc summary{padding:12px 16px;cursor:pointer;font-size:13px;font-weight:600;background:#fbfaf7;color:var(--green-dark);letter-spacing:.2px;}
  details.acc .acc-body{padding:16px;font-size:13px;line-height:1.8;}
  .scenario-card{border:1px solid var(--gray-line);border-radius:10px;padding:14px 16px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;background:#fff;}
  .footer-note{text-align:center;font-size:11px;color:#a19d8f;margin-top:34px;padding-top:18px;border-top:1px solid var(--gray-line);letter-spacing:.2px;}
  select.pill{border-radius:999px;}
  .dash-hero{background:linear-gradient(135deg,#0f2a1c,#0a1a12);border-radius:var(--radius);padding:40px 44px;color:#fff;border:1px solid var(--gold);margin-bottom:20px;position:relative;overflow:hidden;}
  .dash-hero .eyebrow{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold-bright);margin-bottom:12px;font-weight:600;}
  .dash-hero .headline{font-family:'Sarabun',sans-serif;font-size:32px;font-weight:700;line-height:1.3;color:#fff;margin:0 0 14px;max-width:900px;}
  .dash-hero .headline b{color:var(--gold-bright);font-weight:700;}
  .dash-hero .sub{color:#c7cec6;font-size:13px;max-width:680px;line-height:1.8;}
  .dash-hero .hero-actions{margin-top:22px;display:flex;gap:10px;flex-wrap:wrap;}
  .spec-wrap{overflow-x:auto;border-radius:var(--radius);}
  .spec-compare{display:grid;grid-template-columns:190px repeat(4,minmax(140px,1fr));gap:1px;background:var(--gray-line);border:1px solid var(--gray-line);border-radius:var(--radius);overflow:hidden;min-width:820px;}
  .spec-compare .spec-cell{background:#fff;padding:13px 14px;font-size:12.5px;display:flex;align-items:center;}
  .spec-compare .spec-cell.label-cell{background:var(--gray-bg);color:var(--text-mute);font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
  .spec-compare .spec-cell.header-cell{background:var(--green);color:#fff;font-weight:600;text-align:center;padding:16px 12px;flex-direction:column;justify-content:center;font-size:13.5px;}
  .spec-compare .spec-cell.header-cell.hero{background:linear-gradient(160deg,#1c4a30,#0c2016);border-top:2px solid var(--gold);}
  .spec-compare .spec-cell.header-cell .crown{display:block;font-size:9px;color:var(--gold-bright);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:5px;font-weight:700;}
  .spec-compare .spec-cell.value-cell{justify-content:center;text-align:center;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums;}
  .spec-compare .spec-cell.value-cell.hero{background:#fbf8ef;color:var(--green-dark);}
  .spec-compare .spec-cell.value-cell.best{color:var(--green-mid);}
  .spec-compare .spec-cell.value-cell.best:after{content:"";}
  .dash-radar-box{background:#fff;border:1px solid var(--gray-line);border-radius:var(--radius);padding:22px;box-shadow:0 1px 2px rgba(20,20,10,.03);}
  .dash-radar-box h3{font-size:12px;margin:0 0 4px;color:var(--text-mute);font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
  .dash-radar-box .radar-sub{font-size:11.5px;color:var(--text-mute);margin-bottom:14px;}
  @media print{
    header.topbar, nav.tabs, .no-print{display:none !important;}
    body{background:#fff;}
    .panel{display:none !important;}
    #printArea{display:block !important;}
  }
  #printArea{display:none;}
  #toastNotice{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green-dark);color:#f2efe6;padding:13px 22px;border-radius:999px;font-size:13px;font-weight:500;letter-spacing:.2px;box-shadow:0 8px 24px rgba(0,0,0,.25);border:1px solid var(--gold);opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;z-index:200;display:flex;align-items:center;gap:8px;}
  #toastNotice.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #toastNotice .toast-dot{width:7px;height:7px;border-radius:50%;background:var(--gold-bright);flex:0 0 auto;}
</style>

<style>
  #gateOverlay{position:fixed;inset:0;background:#0c2016;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:'Sarabun',sans-serif;}
  #gateBox{background:#fff;border-radius:14px;padding:40px 34px;width:320px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center;border-top:3px solid #a9843a;}
  #gateBox h2{color:#0c2016;font-size:18px;margin:0 0 6px;font-weight:600;letter-spacing:.3px;}
  #gateBox p{color:#726f64;font-size:12.5px;margin:0 0 20px;}
  #gatePw{width:100%;padding:11px 12px;border:1px solid #e6e3da;border-radius:8px;font-size:15px;font-family:inherit;box-sizing:border-box;margin-bottom:14px;text-align:center;}
  #gateBtn{width:100%;padding:11px;border:none;border-radius:8px;background:#a9843a;color:#fff;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;letter-spacing:.3px;}
  #gateBtn:hover{background:#8f6d2e;}
  #gateErr{color:#8a3324;font-size:12.5px;margin-top:10px;min-height:16px;}
</style>
</head>
<body>
<div id="gateOverlay">
  <div id="gateBox">
    <h2>TCO Simulator</h2>
    <p>กรุณากรอกรหัสผ่านเพื่อเข้าใช้งาน</p>
    <input type="password" id="gatePw" placeholder="รหัสผ่าน" autofocus>
    <button id="gateBtn">เข้าสู่ระบบ</button>
    <div id="gateErr"></div>
  </div>
</div>
<div id="appRoot" style="display:none;"></div>

function b64ToBytes(b64){
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function tryUnlock(password){
  const enc = new TextEncoder();
  const salt = b64ToBytes(ENC.salt);
  const iv = b64ToBytes(ENC.iv);
  const ct = b64ToBytes(ENC.ct);
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name:"PBKDF2", salt, iterations: ENC.iterations, hash:"SHA-256" },
    keyMaterial, { name:"AES-GCM", length:256 }, false, ["decrypt"]
  );
  const plainBuf = await crypto.subtle.decrypt({ name:"AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(plainBuf);
}

function injectApp(html){
  const scripts = [];
  const withoutScripts = html.replace(/<script>([\s\S]*?)<\/script>/g, function(m, code){
    scripts.push(code);
    return "";
  });
  const root = document.getElementById("appRoot");
  root.innerHTML = withoutScripts;
  root.style.display = "";
  document.getElementById("gateOverlay").remove();
  scripts.forEach(function(code){
    const s = document.createElement("script");
    s.textContent = code;
    document.body.appendChild(s);
  });
}

async function attemptUnlock(){
  const pw = document.getElementById("gatePw").value;
  const errEl = document.getElementById("gateErr");
  const btn = document.getElementById("gateBtn");
  btn.disabled = true; btn.textContent = "กำลังตรวจสอบ...";
  try{
    const html = await tryUnlock(pw);
    injectApp(html);
  }catch(e){
    errEl.textContent = "รหัสผ่านไม่ถูกต้อง";
    btn.disabled = false; btn.textContent = "เข้าสู่ระบบ";
  }
}

document.getElementById("gateBtn").addEventListener("click", attemptUnlock);
document.getElementById("gatePw").addEventListener("keydown", function(e){ if(e.key==="Enter") attemptUnlock(); });
</script>
