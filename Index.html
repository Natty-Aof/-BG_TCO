<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCO Simulator | Golf Cart Electric Vehicle — Beyond Green x Club Car</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --green-dark:#123524; --green:#1b4332; --green-mid:#2d6a4f; --green-soft:#e8f0ea;
    --gold:#b8902f; --gold-light:#e9d9a8; --white:#ffffff; --gray-bg:#f4f4f2; --gray-line:#e0ddd6;
    --text:#242420; --text-mute:#6b6b63; --danger:#9a3324; --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Sarabun',sans-serif;background:var(--gray-bg);color:var(--text);font-size:15px;}
  header.topbar{background:var(--green-dark);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.15);}
  header.topbar .brand{display:flex;align-items:center;gap:12px;}
  header.topbar .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--gold);}
  header.topbar h1{font-size:17px;margin:0;font-weight:600;letter-spacing:.3px;}
  header.topbar .sub{font-size:12px;color:#cfd9d2;margin-top:2px;}
  .topbar-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .btn{border:1px solid var(--gray-line);background:#fff;color:var(--text);padding:8px 14px;border-radius:8px;font-family:inherit;font-size:13px;cursor:pointer;transition:.15s;white-space:nowrap;}
  .btn:hover{border-color:var(--gold);color:var(--gold);}
  .btn.gold{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:600;}
  .btn.gold:hover{background:#a17e28;color:#fff;}
  .btn.ghost{background:transparent;border-color:rgba(255,255,255,.35);color:#fff;}
  .btn.ghost:hover{border-color:var(--gold);color:var(--gold-light);}
  .btn.small{padding:5px 10px;font-size:12px;}
  .btn.danger{border-color:var(--danger);color:var(--danger);}
  nav.tabs{display:flex;background:#fff;border-bottom:2px solid var(--gray-line);overflow-x:auto;position:sticky;top:62px;z-index:40;}
  nav.tabs button{flex:0 0 auto;border:none;background:transparent;padding:13px 18px;font-family:inherit;font-size:13.5px;font-weight:500;color:var(--text-mute);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
  nav.tabs button:hover{color:var(--green);}
  nav.tabs button.active{color:var(--green-dark);border-bottom-color:var(--gold);font-weight:600;}
  main{max-width:1360px;margin:0 auto;padding:22px 24px 60px;}
  .panel{display:none;}
  .panel.active{display:block;animation:fade .2s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  .card{background:#fff;border:1px solid var(--gray-line);border-radius:var(--radius);padding:20px;margin-bottom:18px;}
  .card h2{font-size:16px;margin:0 0 4px;color:var(--green-dark);font-weight:600;}
  .card .card-desc{font-size:12.5px;color:var(--text-mute);margin-bottom:14px;}
  .grid{display:grid;gap:14px;}
  .grid.cols-2{grid-template-columns:1fr 1fr;}
  .grid.cols-3{grid-template-columns:repeat(3,1fr);}
  .grid.cols-4{grid-template-columns:repeat(4,1fr);}
  .grid.cols-5{grid-template-columns:repeat(5,1fr);}
  @media(max-width:900px){.grid.cols-2,.grid.cols-3,.grid.cols-4,.grid.cols-5{grid-template-columns:1fr 1fr;}}
  .field label{display:block;font-size:12.5px;color:var(--text-mute);margin-bottom:4px;}
  .field .unit{color:#9a9689;font-weight:400;}
  .field input, .field select{width:100%;padding:9px 10px;border:1px solid var(--gray-line);border-radius:7px;font-family:inherit;font-size:14px;background:#fff;color:var(--text);}
  .field input:focus, .field select:focus{outline:none;border-color:var(--gold);}
  .brandblock{border:1px solid var(--gray-line);border-radius:var(--radius);padding:16px;background:#fbfbfa;}
  .brandblock.clubcar{border-top:3px solid var(--green);}
  .brandblock.competitor{border-top:3px solid var(--gold);}
  .brandblock h3{margin:0 0 10px;font-size:14.5px;display:flex;justify-content:space-between;align-items:center;}
  .tag{display:inline-block;font-size:10.5px;padding:2px 7px;border-radius:20px;margin-left:6px;font-weight:500;vertical-align:middle;}
  .tag.standard{background:var(--green-soft);color:var(--green-mid);}
  .tag.actual{background:var(--gold-light);color:#7a5f1c;}
  .tag.unverified{background:#fbe4dd;color:var(--danger);}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  @media(max-width:1000px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
  .kpi{background:#fff;border:1px solid var(--gray-line);border-left:4px solid var(--green);border-radius:var(--radius);padding:16px 18px;}
  .kpi.gold{border-left-color:var(--gold);}
  .kpi .kpi-label{font-size:12px;color:var(--text-mute);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
  .kpi .kpi-value{font-size:22px;font-weight:700;color:var(--green-dark);}
  .kpi .kpi-sub{font-size:11.5px;color:var(--text-mute);margin-top:4px;}
  .kpi .info-btn{cursor:pointer;color:#b3b0a4;font-size:12px;border:1px solid var(--gray-line);border-radius:50%;width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;}
  .kpi .formula-note{display:none;font-size:11px;color:var(--text-mute);background:var(--gray-bg);padding:8px;border-radius:6px;margin-top:8px;line-height:1.5;}
  .kpi .formula-note.show{display:block;}
  table{width:100%;border-collapse:collapse;font-size:12.8px;}
  table th{background:var(--green-dark);color:#fff;padding:8px 10px;text-align:right;font-weight:500;position:sticky;top:0;}
  table th:first-child, table td:first-child{text-align:left;}
  table td{padding:7px 10px;text-align:right;border-bottom:1px solid var(--gray-line);}
  table tr:nth-child(even) td{background:#faf9f7;}
  .table-wrap{max-height:480px;overflow:auto;border:1px solid var(--gray-line);border-radius:8px;}
  .chart-box{background:#fff;border:1px solid var(--gray-line);border-radius:var(--radius);padding:16px;margin-bottom:18px;}
  .chart-box h3{font-size:14px;margin:0 0 12px;color:var(--green-dark);}
  .chart-box canvas{max-height:340px;}
  .exec-summary{background:linear-gradient(180deg,#fff,#fbfaf6);border:1px solid var(--gray-line);border-left:5px solid var(--gold);border-radius:var(--radius);padding:24px;font-size:14.5px;line-height:1.9;}
  .exec-summary p{margin:0 0 12px;}
  .exec-summary strong{color:var(--green-dark);}
  .toggle-row{display:flex;align-items:center;gap:10px;font-size:13px;}
  .switch{position:relative;display:inline-block;width:40px;height:22px;}
  .switch input{opacity:0;width:0;height:0;}
  .slider-tg{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;transition:.2s;border-radius:22px;}
  .slider-tg:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:white;transition:.2s;border-radius:50%;}
  input:checked + .slider-tg{background:var(--green-mid);}
  input:checked + .slider-tg:before{transform:translateX(18px);}
  .badge-winner{background:var(--green);color:#fff;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;}
  .notice{background:#fff8ec;border:1px solid var(--gold-light);border-radius:8px;padding:12px 16px;font-size:12.8px;color:#6b5620;margin-bottom:16px;}
  .notice.collapsed .notice-body{display:none;}
  .section-title{font-size:19px;font-weight:600;color:var(--green-dark);margin:2px 0 4px;}
  .section-sub{font-size:13px;color:var(--text-mute);margin-bottom:16px;}
  details.acc{border:1px solid var(--gray-line);border-radius:8px;margin-bottom:8px;overflow:hidden;}
  details.acc summary{padding:10px 14px;cursor:pointer;font-size:13.5px;font-weight:500;background:#fbfaf7;color:var(--green-dark);}
  details.acc .acc-body{padding:14px;font-size:13px;line-height:1.8;}
  .scenario-card{border:1px solid var(--gray-line);border-radius:8px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;background:#fff;}
  .footer-note{text-align:center;font-size:11.5px;color:#9a9689;margin-top:30px;padding-top:16px;border-top:1px solid var(--gray-line);}
  select.pill{border-radius:20px;}
  @media print{
    header.topbar, nav.tabs, .no-print{display:none !important;}
    body{background:#fff;}
    .panel{display:none !important;}
    #printArea{display:block !important;}
  }
  #printArea{display:none;}
</style>

<style>
  #gateOverlay{position:fixed;inset:0;background:#123524;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:'Sarabun',sans-serif;}
  #gateBox{background:#fff;border-radius:12px;padding:36px 32px;width:320px;max-width:90vw;box-shadow:0 10px 40px rgba(0,0,0,.3);text-align:center;}
  #gateBox h2{color:#123524;font-size:17px;margin:0 0 6px;}
  #gateBox p{color:#6b6b63;font-size:12.5px;margin:0 0 18px;}
  #gatePw{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px;font-family:inherit;box-sizing:border-box;margin-bottom:12px;text-align:center;}
  #gateBtn{width:100%;padding:10px;border:none;border-radius:8px;background:#b8902f;color:#fff;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;}
  #gateBtn:hover{background:#a17e28;}
  #gateErr{color:#9a3324;font-size:12.5px;margin-top:10px;min-height:16px;}
</style>
</head>
<body>
<div id="gateOverlay">
  <div id="gateBox">
    <h2>TCO Simulator</h2>
    <p>กรุณากรอกรหัสผ่านเพื่อเข้าใช้งาน</p>
    <input type="password" id="gatePw" placeholder="รหัสผ่าน" autofocus>
    <button id="gateBtn">เข้าสู่ระบบ</button>
    <div id="gateErr"></div>
  </div>
</div>
<div id="appRoot" style="display:none;"></div>

function b64ToBytes(b64){
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function tryUnlock(password){
  const enc = new TextEncoder();
  const salt = b64ToBytes(ENC.salt);
  const iv = b64ToBytes(ENC.iv);
  const ct = b64ToBytes(ENC.ct);
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name:"PBKDF2", salt, iterations: ENC.iterations, hash:"SHA-256" },
    keyMaterial, { name:"AES-GCM", length:256 }, false, ["decrypt"]
  );
  const plainBuf = await crypto.subtle.decrypt({ name:"AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(plainBuf);
}

function injectApp(html){
  const scripts = [];
  const withoutScripts = html.replace(/<script>([\s\S]*?)<\/script>/g, function(m, code){
    scripts.push(code);
    return "";
  });
  const root = document.getElementById("appRoot");
  root.innerHTML = withoutScripts;
  root.style.display = "";
  document.getElementById("gateOverlay").remove();
  scripts.forEach(function(code){
    const s = document.createElement("script");
    s.textContent = code;
    document.body.appendChild(s);
  });
}

async function attemptUnlock(){
  const pw = document.getElementById("gatePw").value;
  const errEl = document.getElementById("gateErr");
  const btn = document.getElementById("gateBtn");
  btn.disabled = true; btn.textContent = "กำลังตรวจสอบ...";
  try{
    const html = await tryUnlock(pw);
    injectApp(html);
  }catch(e){
    errEl.textContent = "รหัสผ่านไม่ถูกต้อง";
    btn.disabled = false; btn.textContent = "เข้าสู่ระบบ";
  }
}

document.getElementById("gateBtn").addEventListener("click", attemptUnlock);
document.getElementById("gatePw").addEventListener("keydown", function(e){ if(e.key==="Enter") attemptUnlock(); });
</script>
